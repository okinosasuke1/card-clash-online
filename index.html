<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CARD CLASH Online</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;600;700&display=swap');

    :root {
      --bg: #0a0a0f;
      --panel: #12121c;
      --line: rgba(192, 132, 252, 0.36);
      --purple: #c084fc;
      --blue: #60a5fa;
      --pink: #f472b6;
      --red: #fb7185;
      --green: #34d399;
      --ice: #7dd3fc;
      --text: #f8fafc;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at 18% 0%, rgba(96, 165, 250, 0.18), transparent 34%),
        radial-gradient(circle at 82% 8%, rgba(244, 114, 182, 0.16), transparent 32%),
        linear-gradient(135deg, rgba(192, 132, 252, 0.08) 1px, transparent 1px),
        var(--bg);
      background-size: auto, auto, 34px 34px, auto;
      color: var(--text);
      font-family: "Rajdhani", sans-serif;
      overflow-x: hidden;
    }

    button {
      border: 0;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .app {
      width: min(1440px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 24px;
    }

    .title-wrap {
      text-align: center;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-family: "Orbitron", sans-serif;
      font-size: clamp(2.6rem, 8vw, 5.8rem);
      color: var(--text);
      text-shadow: 0 0 12px rgba(192, 132, 252, 0.85), 0 0 34px rgba(96, 165, 250, 0.45);
    }

    .subtitle {
      margin-top: 4px;
      font-family: "Orbitron", sans-serif;
      color: var(--purple);
    }

    .matchmaking {
      min-height: 66vh;
      display: grid;
      place-items: center;
    }

    .match-panel,
    .result-panel {
      width: min(760px, 100%);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(23, 23, 36, 0.96), rgba(12, 12, 20, 0.96));
      box-shadow: 0 0 22px rgba(192, 132, 252, 0.28);
      text-align: center;
    }

    .match-panel h2,
    .result-panel h2 {
      margin: 0 0 18px;
      font-family: "Orbitron", sans-serif;
    }

    .difficulty-row,
    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .name-field {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
      text-align: left;
    }

    .name-field label {
      font-family: "Orbitron", sans-serif;
      color: #d8b4fe;
      font-size: 0.88rem;
    }

    .name-field input {
      width: 100%;
      min-height: 46px;
      padding: 10px 12px;
      border: 1px solid rgba(192, 132, 252, 0.35);
      border-radius: 8px;
      outline: none;
      background: rgba(255, 255, 255, 0.045);
      color: var(--text);
      font-family: "Rajdhani", sans-serif;
      font-size: 1.15rem;
    }

    .name-field input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 14px rgba(192, 132, 252, 0.24);
    }

    .actions {
      grid-template-columns: 1fr 1fr;
      margin-top: 14px;
    }

    .diff,
    .primary,
    .ghost {
      min-height: 46px;
      border: 1px solid rgba(192, 132, 252, 0.35);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
      font-family: "Orbitron", sans-serif;
      transition: border-color 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
    }

    .diff.active,
    .diff:hover,
    .primary:hover,
    .ghost:hover {
      border-color: var(--purple);
      background: rgba(192, 132, 252, 0.14);
      box-shadow: 0 0 14px rgba(192, 132, 252, 0.24);
    }

    .primary {
      background: linear-gradient(90deg, var(--blue), var(--pink));
      color: #09090f;
      font-weight: 900;
    }

    .queue-text {
      min-height: 28px;
      margin-top: 18px;
      color: #dbeafe;
      font-size: 1.1rem;
    }

    .hidden { display: none !important; }

    .game-layout {
      display: grid;
      grid-template-columns: minmax(230px, 300px) 1fr minmax(230px, 300px);
      gap: 18px;
      align-items: start;
    }

    .player-panel,
    .center-panel {
      border: 1px solid rgba(192, 132, 252, 0.28);
      border-radius: 8px;
      background: rgba(18, 18, 28, 0.9);
      box-shadow: 0 0 18px rgba(0, 0, 0, 0.35);
    }

    .player-panel {
      padding: 16px;
      position: sticky;
      top: 18px;
    }

    .player-panel.active.p1 {
      border-color: var(--blue);
      box-shadow: 0 0 20px rgba(96, 165, 250, 0.35);
    }

    .player-panel.active.p2 {
      border-color: var(--pink);
      box-shadow: 0 0 20px rgba(244, 114, 182, 0.35);
    }

    .player-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .player-name,
    .score,
    .turn-name,
    .timer,
    .skill-meta {
      font-family: "Orbitron", sans-serif;
    }

    .p1 .player-name,
    .p1-text { color: var(--blue); }

    .p2 .player-name,
    .p2-text { color: var(--pink); }

    .score {
      font-size: 2rem;
      line-height: 1;
    }

    .tag {
      display: inline-block;
      margin-bottom: 12px;
      padding: 4px 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      color: #dbeafe;
    }

    .skills {
      display: grid;
      gap: 8px;
    }

    .skill-btn {
      min-height: 46px;
      display: grid;
      grid-template-columns: 30px 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
      text-align: left;
    }

    .skill-btn:not(:disabled):hover {
      border-color: var(--purple);
      background: rgba(192, 132, 252, 0.13);
    }

    .skill-btn:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }

    .skill-icon {
      text-align: center;
      font-size: 1.25rem;
    }

    .skill-name { font-weight: 700; }

    .skill-meta {
      color: #d8b4fe;
      font-size: 0.8rem;
      white-space: nowrap;
    }

    .center-panel {
      padding: 16px;
      min-width: 0;
    }

    .status-bar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      padding: 12px;
      margin-bottom: 14px;
      border: 1px solid rgba(192, 132, 252, 0.35);
      border-radius: 8px;
      background: rgba(10, 10, 15, 0.72);
    }

    .timer {
      min-width: 86px;
      padding: 6px 12px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      text-align: center;
      font-size: 1.45rem;
      color: var(--green);
      background: rgba(255, 255, 255, 0.045);
    }

    .timer.danger {
      color: var(--red);
      border-color: rgba(251, 113, 133, 0.7);
      animation: pulse 0.55s infinite alternate;
    }

    @keyframes pulse {
      from { box-shadow: 0 0 4px rgba(251, 113, 133, 0.4); }
      to { box-shadow: 0 0 22px rgba(251, 113, 133, 0.9); }
    }

    .hint {
      text-align: right;
      color: #c4b5fd;
      font-weight: 700;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(var(--cols), minmax(54px, 1fr));
      gap: clamp(7px, 1vw, 12px);
      width: min(100%, calc(var(--cols) * 96px + (var(--cols) - 1) * 12px));
      margin: 0 auto;
    }

    .card,
    .card-slot {
      aspect-ratio: 1 / 1.18;
      min-height: 68px;
      min-width: 0;
      border-radius: 8px;
    }

    .card {
      perspective: 800px;
      background: transparent;
      padding: 0;
    }

    .card-slot {
      opacity: 0;
      pointer-events: none;
    }

    .card-inner {
      display: block;
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.42s ease, filter 0.24s ease;
    }

    .card.flipped .card-inner,
    .card.peek .card-inner {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      backface-visibility: hidden;
      overflow: hidden;
    }

    .back {
      background:
        linear-gradient(135deg, rgba(192, 132, 252, 0.24), rgba(96, 165, 250, 0.08)),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.04) 0 5px, transparent 5px 10px),
        #151523;
      box-shadow: inset 0 0 24px rgba(192, 132, 252, 0.18);
    }

    .back::before {
      content: "◇";
      font-family: "Orbitron", sans-serif;
      font-size: clamp(1.2rem, 4vw, 2.4rem);
      color: rgba(248, 250, 252, 0.78);
      text-shadow: 0 0 14px var(--purple);
    }

    .front {
      transform: rotateY(180deg);
      background: linear-gradient(180deg, #202033, #10101a);
      font-size: clamp(1.65rem, 5vw, 2.8rem);
    }

    .card.frozen .back,
    .card.frozen .front {
      background: linear-gradient(180deg, rgba(14, 116, 144, 0.75), rgba(15, 23, 42, 0.96));
      border-color: rgba(125, 211, 252, 0.85);
      box-shadow: inset 0 0 22px rgba(125, 211, 252, 0.35);
    }

    .card.frozen .card-inner::after {
      content: "❄";
      position: absolute;
      top: 5px;
      right: 7px;
      z-index: 3;
      filter: drop-shadow(0 0 6px rgba(125, 211, 252, 0.9));
    }

    .log {
      min-height: 48px;
      max-height: 92px;
      overflow-y: auto;
      margin-top: 14px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(10, 10, 15, 0.82);
      line-height: 1.25;
    }

    .result-screen {
      min-height: 62vh;
      display: grid;
      place-items: center;
    }

    @media (max-width: 980px) {
      .app { padding: 16px; }
      .game-layout { grid-template-columns: 1fr 1fr; }
      .center-panel { grid-column: 1 / -1; grid-row: 2; }
      .player-panel { position: static; }
    }

    @media (max-width: 640px) {
      .difficulty-row,
      .actions,
      .game-layout { grid-template-columns: 1fr; }
      .center-panel { grid-row: auto; }
      .status-bar { grid-template-columns: 1fr; text-align: center; }
      .hint { text-align: center; }
      .board {
        grid-template-columns: repeat(var(--cols), minmax(42px, 1fr));
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="title-wrap">
      <h1>CARD CLASH</h1>
      <div class="subtitle">Online PvP Memory Battle</div>
    </header>

    <section id="matchmaking" class="matchmaking">
      <div class="match-panel">
        <h2>TÌM ĐỐI THỦ NGẪU NHIÊN</h2>
        <div class="name-field">
          <label for="player-name">TÊN NHÂN VẬT</label>
          <input id="player-name" maxlength="16" placeholder="Nhập tên của bạn" autocomplete="nickname">
        </div>
        <div class="difficulty-row">
          <button id="diff-easy" class="diff active" onclick="chooseLevel('easy')">Easy · 4x4</button>
          <button id="diff-medium" class="diff" onclick="chooseLevel('medium')">Medium · 4x5</button>
          <button id="diff-hard" class="diff" onclick="chooseLevel('hard')">Hard · 4x6</button>
        </div>
        <div class="actions">
          <button id="find-btn" class="primary" onclick="findMatch()">TÌM TRẬN</button>
          <button class="ghost" onclick="cancelQueue()">HỦY</button>
        </div>
        <div id="queue-text" class="queue-text">Chọn độ khó rồi bấm tìm trận.</div>
      </div>
    </section>

    <section id="game" class="game-layout hidden">
      <aside id="panel-p1" class="player-panel p1">
        <div class="player-head">
          <div id="name-p1" class="player-name">PLAYER 1</div>
          <div id="score-p1" class="score">0</div>
        </div>
        <div id="tag-p1" class="tag hidden">Bạn</div>
        <div id="skills-p1" class="skills"></div>
      </aside>

      <section class="center-panel">
        <div class="status-bar">
          <div id="turn-name" class="turn-name">Đang ghép trận</div>
          <div id="timer" class="timer">15</div>
          <div id="hint" class="hint"></div>
        </div>
        <div id="board" class="board"></div>
        <div id="log" class="log"></div>
      </section>

      <aside id="panel-p2" class="player-panel p2">
        <div class="player-head">
          <div id="name-p2" class="player-name">PLAYER 2</div>
          <div id="score-p2" class="score">0</div>
        </div>
        <div id="tag-p2" class="tag hidden">Bạn</div>
        <div id="skills-p2" class="skills"></div>
      </aside>
    </section>

    <section id="result" class="result-screen hidden">
      <div class="result-panel">
        <h2 id="result-title">KẾT THÚC</h2>
        <div id="result-score"></div>
        <div class="actions">
          <button class="primary" onclick="backToMatchmaking()">TÌM TRẬN MỚI</button>
          <button class="ghost" onclick="location.reload()">TẢI LẠI</button>
        </div>
      </div>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const SKILLS = [
      { id: "sight", name: "Soi Vòng", icon: "👁" },
      { id: "chaos", name: "Xào Lại Bài", icon: "🌀" },
      { id: "freeze", name: "Khóa Thẻ", icon: "❄️" }
    ];

    const client = {
      level: "easy",
      state: null,
      playerName: "",
      peekCards: new Map(),
      timerId: null
    };

    function getPlayerName() {
      const input = document.getElementById("player-name");
      const name = input.value.replace(/[<>]/g, "").replace(/\s+/g, " ").trim().slice(0, 16);
      return name || "Người chơi";
    }

    function chooseLevel(level) {
      client.level = level;
      ["easy", "medium", "hard"].forEach(item => {
        document.getElementById(`diff-${item}`).classList.toggle("active", item === level);
      });
    }

    function findMatch() {
      client.playerName = getPlayerName();
      document.getElementById("queue-text").textContent = "Đang tìm đối thủ...";
      document.getElementById("find-btn").disabled = true;
      socket.emit("findMatch", { level: client.level, name: client.playerName });
    }

    function cancelQueue() {
      socket.emit("cancelQueue");
      document.getElementById("queue-text").textContent = "Đã hủy tìm trận.";
      document.getElementById("find-btn").disabled = false;
    }

    function backToMatchmaking() {
      document.getElementById("result").classList.add("hidden");
      document.getElementById("game").classList.add("hidden");
      document.getElementById("matchmaking").classList.remove("hidden");
      document.getElementById("find-btn").disabled = false;
      document.getElementById("queue-text").textContent = "Chọn độ khó rồi bấm tìm trận.";
    }

    socket.on("queue", payload => {
      document.getElementById("queue-text").textContent = payload.message;
    });

    socket.on("queueCancelled", () => {
      document.getElementById("find-btn").disabled = false;
    });

    socket.on("state", payload => {
      client.state = payload.state;
      document.getElementById("matchmaking").classList.add("hidden");
      document.getElementById("result").classList.add("hidden");
      document.getElementById("game").classList.remove("hidden");
      if (payload.log) addLog(payload.log);
      renderAll();
      startLocalTimer();
    });

    socket.on("peek", payload => {
      client.peekCards = new Map((payload.cards || []).map(card => [card.id, card.emoji]));
      renderBoard();
      setTimeout(() => {
        client.peekCards.clear();
        renderBoard();
      }, payload.ms || 2000);
    });

    socket.on("toast", message => addLog(message));

    socket.on("opponentLeft", () => {
      showResult("Đối thủ đã rời trận", []);
    });

    socket.on("gameOver", payload => {
      showResult(payload.result, payload.scores);
    });

    function showResult(title, scores) {
      clearInterval(client.timerId);
      document.getElementById("game").classList.add("hidden");
      document.getElementById("result").classList.remove("hidden");
      document.getElementById("result-title").textContent = title;
      document.getElementById("result-score").innerHTML = scores.map((item, i) =>
        `<div class="${i === 0 ? "p1-text" : "p2-text"}">${item.name}: ${item.score}</div>`
      ).join("");
    }

    function renderAll() {
      renderPlayers();
      renderSkills();
      renderBoard();
      renderStatus();
    }

    function renderPlayers() {
      const state = client.state;
      state.players.forEach((player, index) => {
        document.getElementById(`name-p${index + 1}`).textContent = player.name;
        document.getElementById(`score-p${index + 1}`).textContent = player.score;
        document.getElementById(`panel-p${index + 1}`).classList.toggle("active", index === state.current);
        document.getElementById(`tag-p${index + 1}`).classList.toggle("hidden", index !== state.you);
      });
    }

    function renderSkills() {
      const state = client.state;
      state.players.forEach((player, playerIndex) => {
        const box = document.getElementById(`skills-p${playerIndex + 1}`);
        box.innerHTML = SKILLS.map(skill => {
          const used = !!player.usedSkills[skill.id];
          const usable = playerIndex === state.you && state.current === state.you && !used;
          const meta = used ? "đã dùng" : "1/ván";
          return `
            <button class="skill-btn" onclick="useSkill('${skill.id}')" ${usable ? "" : "disabled"}>
              <span class="skill-icon">${skill.icon}</span>
              <span class="skill-name">${skill.name}</span>
              <span class="skill-meta">${meta}</span>
            </button>
          `;
        }).join("");
      });
    }

    function renderBoard() {
      const state = client.state;
      const board = document.getElementById("board");
      board.style.setProperty("--cols", state.cols);
      board.style.gridTemplateColumns = `repeat(${state.cols}, minmax(54px, 1fr))`;
      board.style.maxWidth = `${state.cols * 96 + (state.cols - 1) * 12}px`;
      board.innerHTML = state.cards.map(card => {
        if (card.matched) return `<span class="card-slot"></span>`;
        const peek = client.peekCards.has(card.id);
        const emoji = card.emoji || client.peekCards.get(card.id) || "";
        const disabled = state.current !== state.you || card.frozen;
        return `
          <button class="card ${card.flipped ? "flipped" : ""} ${peek ? "peek" : ""} ${card.frozen ? "frozen" : ""}" onclick="flipCard(${card.id})" ${disabled ? "disabled" : ""}>
            <span class="card-inner">
              <span class="face back"></span>
              <span class="face front">${emoji}</span>
            </span>
          </button>
        `;
      }).join("");
    }

    function renderStatus() {
      const state = client.state;
      const active = state.players[state.current];
      const cls = state.current === 0 ? "p1-text" : "p2-text";
      document.getElementById("turn-name").innerHTML = `<span class="${cls}">${active.name}</span> đang đi`;
      document.getElementById("hint").textContent = state.current === state.you ? "Lượt của bạn" : "Đợi đối thủ";
      updateTimer();
    }

    function startLocalTimer() {
      clearInterval(client.timerId);
      updateTimer();
      client.timerId = setInterval(updateTimer, 250);
    }

    function updateTimer() {
      if (!client.state) return;
      const seconds = Math.max(0, Math.ceil((client.state.deadline - Date.now()) / 1000));
      const timer = document.getElementById("timer");
      timer.textContent = seconds;
      timer.classList.toggle("danger", seconds <= 5);
    }

    function flipCard(id) {
      socket.emit("flipCard", { id });
    }

    function useSkill(skillId) {
      socket.emit("useSkill", { skillId });
    }

    function addLog(message) {
      const log = document.getElementById("log");
      log.innerHTML = `<div>${message}</div>` + log.innerHTML;
    }
  </script>
</body>
</html>
